<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bröderiet - Hantverksbageri</title>

  <!-- ✅ Preview (det du bad om) -->
  <meta property="og:title" content="Bröderiet - Hantverksbageri">
  <meta property="og:description" content="Färskt bröd levererat till din dörr i Kalmar.">
  <meta property="og:image" content="https://broderiets.se/broderiet.png">
  <meta property="og:url" content="https://broderiets.se">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f0e8;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .delivery-box {
      margin-bottom: 30px;
    }

    .delivery-main {
      font-size: 18px;
      margin-bottom: 5px;
      color: #1a1208;
    }

    .delivery-sub {
      font-size: 14px;
      color: #5c4b3b;
      margin-bottom: 10px;
    }

    .delivery-meta {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .field {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 12px;
      background: black;
      color: white;
      border: none;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- 🔥 NY LEVERANS SEKTION -->
  <div class="delivery-box">
    <p class="delivery-main">Färskt bröd levererat till din dörr i Kalmar.</p>
    <p class="delivery-sub">
      Beställ senast kl. 18:00 för leverans nästkommande dag mellan 06:00–08:00.
    </p>
    <div class="delivery-meta">
      Leverans 49 kr • Fri leverans över 350 kr
    </div>
  </div>

  <!-- 🧾 FORM -->
  <input class="field" id="name" placeholder="Namn">
  <input class="field" id="phone" placeholder="Telefonnummer">
  <input class="field" id="email" placeholder="Mailadress">
  <input class="field" id="address" placeholder="Leveransadress">

  <!-- ⏰ NYTT FÄLT -->
  <select class="field" id="deliveryTime">
    <option value="">Välj leveranstid</option>
    <option>06:00</option>
    <option>06:30</option>
    <option>07:00</option>
    <option>07:30</option>
    <option>08:00</option>
  </select>

  <button onclick="submitOrder()">Skicka beställning</button>

  <p id="msg"></p>

</div>

<script>
function submitOrder() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const address = document.getElementById("address").value.trim();
  const deliveryTime = document.getElementById("deliveryTime").value;

  const msg = document.getElementById("msg");

  if (!name || !phone || !email || !address || !deliveryTime) {
    msg.textContent = "Fyll i alla fält.";
    return;
  }

  fetch("/.netlify/functions/order", {
    method: "POST",
    body: JSON.stringify({
      name,
      phone,
      email,
      address,
      deliveryTime,
      items: []
    })
  })
  .then(() => {
    msg.textContent = "Beställning skickad!";
  })
  .catch(() => {
    msg.textContent = "Något gick fel.";
  });
}
</script>

</body>
</html>
